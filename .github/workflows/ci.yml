# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma clients
        run: |
          npm run prisma:generate:auth
          npm run prisma:generate:vehicles
          npm run prisma:generate:traffic
          npm run prisma:generate:incidents
          npm run prisma:generate:notifications
        continue-on-error: true
      
      - name: Run tests
        run: npm test
        continue-on-error: true
      
      - name: Run tests with coverage
        run: npm run test:cov
        continue-on-error: true
      
      - name: TypeScript compile check
        run: npx tsc --noEmit
        continue-on-error: true
